name: Build PCR Mod APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install APKTool
      run: |
        curl -L -o apktool.jar https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar
        echo '#!/bin/bash' > apktool.sh
        echo 'java -jar /usr/local/bin/apktool.jar "$@"' >> apktool.sh
        chmod +x apktool.sh
        sudo mv apktool.sh /usr/local/bin/apktool
        sudo mv apktool.jar /usr/local/bin/
        apktool --version

    - name: Download APK
      run: |
        curl -L -o pcr.apk "https://github.com/botnamelast/pcr-mod/releases/download/kontol/pcr.apk.zip"
        file pcr.apk
        ls -lh pcr.apk

    - name: Decompile APK
      run: |
        apktool d pcr.apk -o pcr_decompiled/ --force
        echo "=== Decompile selesai ==="
        ls pcr_decompiled/

    - name: Compile Java Mod Files
      run: |
        # Siapkan Android SDK stubs untuk compile
        mkdir -p android_stubs

        # Download android.jar untuk compile
        curl -L -o android.jar \
          "https://github.com/Reginer/aosp-android-jar/raw/main/android-33/android.jar"

        # Compile semua file Java mod
        mkdir -p compiled_classes
        javac -source 8 -target 8 \
          -cp android.jar \
          -d compiled_classes \
          src/com/StudioFurukawa/PixelCarRacer/MemoryUtils.java \
          src/com/StudioFurukawa/PixelCarRacer/AutoShift.java \
          src/com/StudioFurukawa/PixelCarRacer/ModMenu.java

        echo "=== Compile Java selesai ==="
        find compiled_classes -name "*.class"

    - name: Convert Class ke DEX ke Smali
      run: |
        # Pakai d8 dari Android build tools
        curl -L -o build-tools.zip \
          "https://dl.google.com/android/repository/build-tools_r34-linux.zip"
        unzip -q build-tools.zip -d build-tools/
        chmod +x build-tools/android-14/d8

        # Convert .class ke .dex
        mkdir -p dex_output
        find compiled_classes -name "*.class" | xargs \
          build-tools/android-14/d8 \
          --output dex_output/ \
          --min-api 21

        echo "=== DEX output ==="
        ls -lh dex_output/

        # Extract smali dari dex
        curl -L -o baksmali.jar \
          "https://github.com/JesusFreke/smali/releases/download/v2.5.2/baksmali-2.5.2.jar"
        java -jar baksmali.jar d dex_output/classes.dex -o smali_output/

        echo "=== Smali output ==="
        find smali_output -name "*.smali"

    - name: Inject Smali Ke APK
      run: |
        # Copy smali mod ke folder APK yang sudah didecompile
        cp -r smali_output/com/StudioFurukawa/PixelCarRacer/ModMenu*.smali \
          pcr_decompiled/smali/com/StudioFurukawa/PixelCarRacer/
        cp -r smali_output/com/StudioFurukawa/PixelCarRacer/AutoShift*.smali \
          pcr_decompiled/smali/com/StudioFurukawa/PixelCarRacer/
        cp -r smali_output/com/StudioFurukawa/PixelCarRacer/MemoryUtils*.smali \
          pcr_decompiled/smali/com/StudioFurukawa/PixelCarRacer/

        echo "=== File smali ter-inject ==="
        ls pcr_decompiled/smali/com/StudioFurukawa/PixelCarRacer/Mod*
        ls pcr_decompiled/smali/com/StudioFurukawa/PixelCarRacer/Auto*
        ls pcr_decompiled/smali/com/StudioFurukawa/PixelCarRacer/Memory*

    - name: Patch DemoRenderer.smali
      run: |
        DEMO="pcr_decompiled/smali/com/StudioFurukawa/PixelCarRacer/DemoRenderer.smali"

        # Inject AutoShift.tick() setelah :cond_3
        python3 << 'PYEOF'
        import re

        with open("pcr_decompiled/smali/com/StudioFurukawa/PixelCarRacer/DemoRenderer.smali", "r") as f:
            content = f.read()

        inject = """
            # === PCR MOD: AutoShift tick ===
            invoke-static {}, Lcom/StudioFurukawa/PixelCarRacer/AutoShift;->tick()V
            # === END PCR MOD ===
        """

        # Cari target inject point
        target = "    .line 400\n    :cond_3"
        if target in content:
            content = content.replace(target, target + inject)
            print("✅ DemoRenderer patch berhasil!")
        else:
            # Coba cari :cond_3 saja
            target2 = "    :cond_3"
            occurrences = [m.start() for m in re.finditer(re.escape(target2), content)]
            print(f"Found :cond_3 at positions: {occurrences}")
            if len(occurrences) >= 2:
                # Ambil yang ke-2 (setelah pause check)
                pos = occurrences[1]
                content = content[:pos + len(target2)] + inject + content[pos + len(target2):]
                print("✅ DemoRenderer patch berhasil (fallback)!")
            else:
                print("❌ Target inject point tidak ditemukan!")

        with open("pcr_decompiled/smali/com/StudioFurukawa/PixelCarRacer/DemoRenderer.smali", "w") as f:
            f.write(content)
        PYEOF

    - name: Patch RunnerActivity.smali
      run: |
        python3 << 'PYEOF'
        with open("pcr_decompiled/smali/com/StudioFurukawa/PixelCarRacer/RunnerActivity.smali", "r") as f:
            content = f.read()

        target = "    sput-object p0, Lcom/StudioFurukawa/PixelCarRacer/RunnerActivity;->CurrentActivity:Lcom/StudioFurukawa/PixelCarRacer/RunnerActivity;"

        inject = """
            # === PCR MOD: Attach ModMenu ===
            invoke-static {p0}, Lcom/StudioFurukawa/PixelCarRacer/ModMenu;->attach(Landroid/content/Context;)V
            # === END PCR MOD ===
        """

        if target in content:
            content = content.replace(target, target + inject)
            print("✅ RunnerActivity patch berhasil!")
        else:
            print("❌ Target inject point tidak ditemukan!")
            # Print sekitar area yang dicari untuk debug
            idx = content.find("CurrentActivity")
            if idx != -1:
                print("Context:", content[idx-100:idx+200])

        with open("pcr_decompiled/smali/com/StudioFurukawa/PixelCarRacer/RunnerActivity.smali", "w") as f:
            f.write(content)
        PYEOF

    - name: Verify Patches
      run: |
        echo "=== Cek DemoRenderer patch ==="
        grep -n "PCR MOD\|AutoShift" \
          pcr_decompiled/smali/com/StudioFurukawa/PixelCarRacer/DemoRenderer.smali

        echo "=== Cek RunnerActivity patch ==="
        grep -n "PCR MOD\|ModMenu" \
          pcr_decompiled/smali/com/StudioFurukawa/PixelCarRacer/RunnerActivity.smali

    - name: Recompile APK
      run: |
        apktool b pcr_decompiled/ -o pcr_mod_unsigned.apk
        ls -lh pcr_mod_unsigned.apk

    - name: Sign APK
      run: |
        # Generate keystore
        keytool -genkeypair \
          -keystore mod.keystore \
          -alias modkey \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass modpass \
          -keypass modpass \
          -dname "CN=PCRMod, OU=Mod, O=PCRMod, L=ID, S=ID, C=ID" \
          -noprompt

        # Sign dengan apksigner
        curl -L -o apksigner.jar \
          "https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar"

        java -jar apksigner.jar \
          --apks pcr_mod_unsigned.apk \
          --ks mod.keystore \
          --ks-pass pass:modpass \
          --ks-key-alias modkey \
          --out pcr_mod_signed.apk

        ls -lh pcr_mod_signed.apk

    - name: Upload APK Hasil
      uses: actions/upload-artifact@v4
      with:
        name: PCR-Mod-APK
        path: pcr_mod_signed.apk
        retention-days: 7
        
