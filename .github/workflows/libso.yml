name: Analyze libyoyo

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Download dan Extract .so
      run: |
        curl -L -o pcr.apk https://github.com/botnamelast/pcr-mod/releases/download/kontol/pcr.apk.zip
        unzip -o pcr.apk lib/arm64-v8a/libyoyo.so
        ls -lh lib/arm64-v8a/libyoyo.so

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Download Ghidra
      run: |
        curl -L -o ghidra.zip https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_11.1.2_build/ghidra_11.1.2_PUBLIC_20240709.zip
        unzip -q ghidra.zip

    - name: Analyze libyoyo.so
      run: |
        mkdir -p ghidra_out
        ghidra_11.1.2_PUBLIC/support/analyzeHeadless \
          ghidra_out MyProject \
          -import lib/arm64-v8a/libyoyo.so \
          -analysisTimeoutPerFile 600 \
          -readOnly \
          2>&1 | tee ghidra_log.txt
        echo "=== Last 30 lines ==="
        tail -30 ghidra_log.txt

    - name: Export strings dari .so
      run: |
        # Cari string RPM, gear, NOS di binary
        strings lib/arm64-v8a/libyoyo.so | grep -i -E \
          "rpm|gear|nos|shift|speed|throttle|engine" \
          > so_strings.txt
        echo "=== Strings ketemu ==="
        cat so_strings.txt
        wc -l so_strings.txt

    - name: Upload semua hasil
      uses: actions/upload-artifact@v4
      with:
        name: analyze-results
        path: |
          so_strings.txt
          ghidra_log.txt
          ghidra_out/
        retention-days: 7
