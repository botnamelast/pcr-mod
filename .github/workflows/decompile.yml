name: Decompile PCR

on:
  workflow_dispatch:

jobs:
  decompile:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Rename files
      shell: cmd
      run: |
        rename game.partaa.zip game.partaa
        rename game.partab.zip game.partab
        rename game.partac.zip game.partac

    - name: Merge split files
      shell: cmd
      run: |
        copy /b game.partaa+game.partab+game.partac game.droid
        dir game.droid

    # Clone dan compile UTMT dari source!
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Clone UTMT source
      run: |
        git clone --recurse-submodules https://github.com/UnderminersTeam/UndertaleModTool.git utmt-src

    - name: Build UTMT CLI
      run: |
        cd utmt-src
        dotnet publish UndertaleModCli -c Release -o ../utmt-build
        dir ../utmt-build

    - name: Test info
      run: |
        cd utmt-build
        ./UndertaleModCli.exe info ../game.droid
      continue-on-error: true

    - name: Run Decompile
      run: |
        cd utmt-build
        ./UndertaleModCli.exe load ../game.droid --scripts ../decompile.csx
      continue-on-error: true

    - name: Upload hasil
      uses: actions/upload-artifact@v4
      with:
        name: hasil-decompile
        path: utmt-build/hasil_decompile.zip
        retention-days: 7
