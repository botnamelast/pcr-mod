name: Decompile PCR

on:
  workflow_dispatch:

jobs:
  decompile:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    # Rename .zip jadi tanpa ekstensi
    - name: Rename files
      shell: cmd
      run: |
        rename game.partaa.zip game.partaa
        rename game.partab.zip game.partab
        rename game.partac.zip game.partac
        echo Rename done!
        dir game.part*
    
    # Gabung split files
    - name: Merge split files
      shell: cmd
      run: |
        copy /b game.partaa+game.partab+game.partac game.droid
        echo Merge done!
        dir game.droid
    
    # Download UTMT
    - name: Download UTMT
      run: |
        curl -L -o utmt.zip https://github.com/UndermineDev/UndertaleModTool/releases/latest/download/UndertaleModToolCLI.zip
        Expand-Archive utmt.zip -DestinationPath utmt/
        dir utmt/
    
    # Jalankan decompile
    - name: Run Decompile
      run: |
        cd utmt
        ./UndertaleModToolCLI.exe ../game.droid ../decompile.csx
    
    # Upload hasil - GANTI KE V4!
    - name: Upload hasil
      uses: actions/upload-artifact@v4
      with:
        name: hasil-decompile
        path: utmt/hasil_decompile.zip
        retention-days: 7
