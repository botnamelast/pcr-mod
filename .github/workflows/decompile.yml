name: Decompile PCR

on:
  workflow_dispatch:

jobs:
  decompile:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Download game.droid
      run: |
        curl -L -o game.droid.zip https://github.com/botnamelast/pcr-mod/releases/download/kontol/game_patched.droid.zip
        Move-Item game.droid.zip game.droid
        dir game.droid

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Clone UTMT source
      run: |
        git clone --recurse-submodules https://github.com/UnderminersTeam/UndertaleModTool.git utmt-src

    # Lihat source yang crash dulu!
    - name: Print source line 120-135
      run: |
        Get-Content utmt-src/UndertaleModLib/UndertaleChunks.cs | Select-Object -Index (115..140)

    - name: Build UTMT CLI
      run: |
        cd utmt-src
        dotnet publish UndertaleModCli -c Release -o ../utmt-build

    - name: Test info
      run: |
        cd utmt-build
        ./UndertaleModCli.exe info ../game.droid
      continue-on-error: true

    - name: Upload hasil
      uses: actions/upload-artifact@v4
      with:
        name: hasil-decompile
        path: utmt-build/hasil_decompile.zip
        retention-days: 7
