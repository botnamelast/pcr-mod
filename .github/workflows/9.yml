name: Cek Smali

on:
  workflow_dispatch:

jobs:
  smali:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Download APK
      run: |
        curl -L -o pcr.apk https://github.com/botnamelast/pcr-mod/releases/download/kontol/pcr.apk.zip

    - name: Setup Java + APKTool
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install APKTool
      run: |
        curl -L -o apktool.jar https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar
        echo '#!/bin/bash' > apktool
        echo 'java -jar /usr/local/bin/apktool.jar "$@"' >> apktool
        chmod +x apktool
        sudo mv apktool /usr/local/bin/
        sudo mv apktool.jar /usr/local/bin/

    - name: Decompile APK
      run: |
        apktool d pcr.apk -o pcr_decompiled/ --force

    - name: Zip smali PCR
      run: |
        cd pcr_decompiled/smali/com/StudioFurukawa/PixelCarRacer/
        zip -r /tmp/pcr_smali.zip .
        ls -lh /tmp/pcr_smali.zip

    - name: Upload smali zip
      uses: actions/upload-artifact@v4
      with:
        name: pcr-smali
        path: /tmp/pcr_smali.zip
        retention-days: 7
